<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ET Compass - AI Financial Guide</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --et-red: #C41E3A;
  --dark: #1F2937;
  --light: #F3F4F6;
  --border: #E5E7EB;
  --white: #FFFFFF;
  --text-muted: #6B7280;
}

html, body {
  width: 100%;
  height: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--light);
  color: var(--dark);
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 40px;
  background: var(--white);
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  color: var(--et-red);
  font-weight: 800;
  font-size: 22px;
  cursor: pointer;
  letter-spacing: -0.5px;
}

.nav-links {
  display: flex;
  gap: 40px;
}

.nav-links span {
  cursor: pointer;
  font-size: 15px;
  color: var(--dark);
  transition: all 0.3s;
  font-weight: 500;
  padding-bottom: 8px;
  border-bottom: 2px solid transparent;
}

.nav-links span:hover {
  color: var(--et-red);
  border-bottom-color: var(--et-red);
}

.nav-links span.active {
  color: var(--et-red);
  border-bottom-color: var(--et-red);
}

/* SCREENS */
.screen {
  display: none;
  animation: fadeIn 0.3s ease;
  min-height: calc(100vh - 60px);
}

.screen.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* HERO */
.hero {
  padding: 40px 40px;
  text-align: center;
  background: linear-gradient(135deg, rgba(196,30,58,0.05) 0%, rgba(3,125,168,0.05) 100%);
  border-bottom: 1px solid var(--border);
}

.hero h1 {
  color: var(--et-red);
  font-size: 36px;
  margin-bottom: 12px;
  font-weight: 800;
}

.hero p {
  color: var(--text-muted);
  font-size: 16px;
  margin-bottom: 24px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

.btn {
  background: var(--et-red);
  color: var(--white);
  border: none;
  padding: 12px 28px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 700;
  font-size: 14px;
  transition: all 0.3s;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.btn:hover {
  background: #a01729;
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(196,30,58,0.3);
}

.btn-secondary {
  background: var(--white);
  color: var(--et-red);
  border: 2px solid var(--et-red);
}

.btn-secondary:hover {
  background: #fff5f7;
}

/* CHAT */
.chat-box {
  max-width: 700px;
  margin: 20px auto;
  background: var(--white);
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  display: flex;
  flex-direction: column;
  height: 500px;
}

.messages {
  flex: 1;
  margin-bottom: 15px;
  overflow-y: auto;
  padding-right: 8px;
}

.message {
  padding: 12px 15px;
  margin: 10px 0;
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.4;
}

.message.bot {
  background: #EEF2FF;
  color: var(--dark);
  margin-right: auto;
  max-width: 80%;
  border-left: 4px solid var(--et-red);
}

.message.user {
  background: var(--et-red);
  color: var(--white);
  margin-left: auto;
  max-width: 80%;
  text-align: right;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.option {
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  background: var(--white);
  font-size: 13px;
  font-weight: 500;
}

.option:hover {
  border-color: var(--et-red);
  background: #fff5f7;
  color: var(--et-red);
  transform: translateX(3px);
}

/* PROFILE */
.profile-card {
  max-width: 700px;
  margin: 30px auto;
  background: var(--white);
  padding: 35px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.profile-card h2 {
  color: var(--et-red);
  margin-bottom: 25px;
  font-size: 26px;
}

.profile-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-bottom: 25px;
}

.info-item {
  background: var(--light);
  padding: 14px;
  border-radius: 6px;
  border-left: 4px solid var(--et-red);
}

.info-label {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 5px;
}

.info-value {
  font-size: 14px;
  color: var(--et-red);
  font-weight: 700;
}

.profile-buttons {
  display: flex;
  gap: 10px;
}

.profile-buttons button {
  flex: 1;
  font-size: 13px;
}

/* DASHBOARD */
.dashboard {
  padding: 30px 40px;
  background: var(--light);
}

.dashboard h2 {
  color: var(--dark);
  font-size: 26px;
  margin-bottom: 6px;
  font-weight: 800;
}

.dashboard-subtitle {
  color: var(--text-muted);
  font-size: 13px;
  margin-bottom: 25px;
}

.section {
  margin-bottom: 30px;
}

.section h3 {
  color: var(--et-red);
  font-size: 16px;
  margin-bottom: 16px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  width: 100%;
}

@media (max-width: 1400px) {
  .cards {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 1000px) {
  .cards {
    grid-template-columns: repeat(2, 1fr);
  }
}

.card {
  background: var(--white);
  padding: 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.25s;
  border-top: 4px solid transparent;
  display: flex;
  flex-direction: column;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  border-top-color: var(--et-red);
  border-color: var(--et-red);
}

.card-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 12px;
}

.card-icon {
  font-size: 24px;
  min-width: 30px;
}

.card-header {
  flex: 1;
}

.badge {
  font-size: 9px;
  color: var(--et-red);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.2px;
  margin-bottom: 4px;
}

.card h4 {
  font-size: 14px;
  color: var(--dark);
  margin-bottom: 6px;
  line-height: 1.3;
  font-weight: 700;
}

.card-desc {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 14px;
  line-height: 1.4;
  flex-grow: 1;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}

.tag {
  font-size: 10px;
  background: linear-gradient(135deg, rgba(196,30,58,0.1), rgba(3,125,168,0.1));
  color: var(--et-red);
  padding: 4px 8px;
  border-radius: 12px;
  font-weight: 600;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.card-meta {
  font-size: 11px;
  color: #10B981;
  font-weight: 600;
}

.card-arrow {
  color: var(--et-red);
  font-weight: 800;
  font-size: 14px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.3s;
}

.modal.active {
  display: flex;
}

.modal-content {
  background: var(--white);
  padding: 35px;
  border-radius: 10px;
  max-width: 550px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 15px;
  right: 15px;
  background: none;
  border: none;
  font-size: 28px;
  color: var(--text-muted);
  cursor: pointer;
}

.modal-close:hover {
  color: var(--et-red);
}

.modal h2 {
  color: var(--et-red);
  margin-bottom: 15px;
  font-size: 22px;
}

.modal-desc {
  color: var(--text-muted);
  margin-bottom: 20px;
  line-height: 1.5;
  font-size: 14px;
}

.modal-btn {
  width: 100%;
  margin-top: 20px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .navbar {
    padding: 10px 20px;
    gap: 15px;
  }

  .logo {
    font-size: 18px;
  }

  .nav-links {
    gap: 20px;
    font-size: 13px;
  }

  .hero {
    padding: 25px 20px;
  }

  .hero h1 {
    font-size: 26px;
  }

  .dashboard {
    padding: 20px;
  }

  .cards {
    grid-template-columns: 1fr;
  }

  .profile-info {
    grid-template-columns: 1fr;
  }

  .profile-buttons {
    flex-direction: column;
  }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo" onclick="goHome()">ET Compass</div>
  <div class="nav-links">
    <span onclick="goHome()" class="nav-home active">Home</span>
    <span onclick="filterDash('Prime')" class="nav-prime">ET Prime</span>
    <span onclick="filterDash('Markets')" class="nav-markets">Markets</span>
    <span onclick="filterDash('Learning')" class="nav-learning">Masterclass</span>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2 id="modalTitle"></h2>
    <p class="modal-desc" id="modalDesc"></p>
    <button class="btn modal-btn" id="modalBtn">Open on ET →</button>
  </div>
</div>

<!-- SCREEN 1: LANDING -->
<div id="landing" class="screen active">
  <div class="hero">
    <h1>Your Personal Financial Guide</h1>
    <p>Get AI-powered personalized recommendations from Economic Times based on your goals</p>
    <button class="btn" onclick="startChat()">Begin Profiling</button>
  </div>
</div>

<!-- SCREEN 2: CHAT -->
<div id="chat" class="screen">
  <div class="chat-box">
    <div class="messages" id="messages"></div>
    <div class="options" id="options"></div>
  </div>
</div>

<!-- SCREEN 3: PROFILE -->
<div id="profile" class="screen">
  <div class="profile-card">
    <h2>Your Profile</h2>
    <div class="profile-info" id="profileInfo"></div>
    <div class="profile-buttons">
      <button class="btn" onclick="loadDash()">View Dashboard →</button>
      <button class="btn btn-secondary" onclick="startChat()">Adjust</button>
    </div>
  </div>
</div>

<!-- SCREEN 4: DASHBOARD -->
<div id="dashboard" class="screen">
  <h2>Your Dashboard</h2>
  <p class="dashboard-subtitle">Personalized recommendations from Economic Times</p>
  <div id="dashboardContent"></div>
</div>

<script>
let qIndex = 0;
let answers = [];
let currentFilter = null;

const questions = [
  { text: "Who are you?", opts: ["Student", "Working Professional", "Investor"], key: "type" },
  { text: "What's your goal?", opts: ["Learn Investing", "Grow Wealth", "Track Markets"], key: "goal" },
  { text: "Risk tolerance?", opts: ["Low Risk", "Medium Risk", "High Risk"], key: "risk" }
];

const etData = [
  { title: "Stocks 101: Beginner's Guide", cat: "Prime", desc: "Master fundamental stock market investing concepts", tags: ["Basics", "Investing"], url: "https://economictimes.indiatimes.com", icon: "📈" },
  { title: "Index Funds Strategy", cat: "Prime", desc: "Passive investing with diversified index funds", tags: ["Passive", "Diversification"], url: "https://economictimes.indiatimes.com", icon: "💼" },
  { title: "ET Prime Exclusive News", cat: "Prime", desc: "Insider analysis and breaking market news", tags: ["News", "Analysis"], url: "https://economictimes.indiatimes.com", icon: "📰" },
  { title: "Live Stock Quotes", cat: "Markets", desc: "Real-time prices with technical analysis", tags: ["Real-time", "Technical"], url: "https://economictimes.indiatimes.com/markets", icon: "📊" },
  { title: "IPO Calendar & Tracker", cat: "Markets", desc: "Track upcoming IPOs and details", tags: ["IPO", "Calendar"], url: "https://economictimes.indiatimes.com/markets", icon: "🎯" },
  { title: "Market Analysis", cat: "Markets", desc: "Weekly trends and sector performance", tags: ["Trends", "Sectors"], url: "https://economictimes.indiatimes.com/markets", icon: "🔍" },
  { title: "Investing 101 Masterclass", cat: "Learning", desc: "Complete video series on investments", tags: ["Video", "Course"], url: "https://economictimes.indiatimes.com/masterclass", icon: "🎓" },
  { title: "Portfolio Building", cat: "Learning", desc: "Build and manage your portfolio", tags: ["Portfolio", "Strategy"], url: "https://economictimes.indiatimes.com/masterclass", icon: "🏗️" },
  { title: "Wealth Management", cat: "Learning", desc: "Expert tips on long-term wealth", tags: ["Wealth", "Planning"], url: "https://economictimes.indiatimes.com/masterclass", icon: "💎" }
];

function showScreen(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
  updateNavbar();
}

function goHome() {
  qIndex = 0;
  answers = [];
  currentFilter = null;
  showScreen('landing');
}

function updateNavbar() {
  document.querySelectorAll('.nav-links span').forEach(s => s.classList.remove('active'));
  const screen = document.querySelector('.screen.active')?.id;
  if (screen === 'landing') document.querySelector('.nav-home').classList.add('active');
}

function startChat() {
  qIndex = 0;
  answers = [];
  renderChat();
  showScreen('chat');
}

function renderChat() {
  const msgsDiv = document.getElementById('messages');
  const optsDiv = document.getElementById('options');
  msgsDiv.innerHTML = '';
  optsDiv.innerHTML = '';

  answers.forEach(ans => {
    const msg = document.createElement('div');
    msg.className = 'message user';
    msg.textContent = ans;
    msgsDiv.appendChild(msg);
  });

  if (qIndex < questions.length) {
    const q = questions[qIndex];
    const botMsg = document.createElement('div');
    botMsg.className = 'message bot';
    botMsg.textContent = q.text;
    msgsDiv.appendChild(botMsg);

    q.opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.textContent = opt;
      btn.onclick = () => selectAnswer(opt);
      optsDiv.appendChild(btn);
    });
  } else {
    const botMsg = document.createElement('div');
    botMsg.className = 'message bot';
    botMsg.textContent = 'Perfect! Your profile is ready.';
    msgsDiv.appendChild(botMsg);
    setTimeout(() => showProfile(), 1000);
  }

  msgsDiv.scrollTop = msgsDiv.scrollHeight;
}

function selectAnswer(ans) {
  answers.push(ans);
  qIndex++;
  renderChat();
}

function showProfile() {
  const profileDiv = document.getElementById('profileInfo');
  profileDiv.innerHTML = `
    <div class="info-item"><div class="info-label">Profile</div><div class="info-value">${answers[0]}</div></div>
    <div class="info-item"><div class="info-label">Goal</div><div class="info-value">${answers[1]}</div></div>
    <div class="info-item"><div class="info-label">Risk</div><div class="info-value">${answers[2]}</div></div>
    <div class="info-item"><div class="info-label">Status</div><div class="info-value">Active ✓</div></div>
  `;
  showScreen('profile');
}

function loadDash() {
  currentFilter = null;
  renderDash();
  showScreen('dashboard');
}

function filterDash(cat) {
  currentFilter = cat;
  renderDash();
  showScreen('dashboard');
}

function renderDash() {
  const content = document.getElementById('dashboardContent');
  content.innerHTML = '';

  let filtered = etData;
  if (currentFilter) filtered = etData.filter(i => i.cat === currentFilter);

  let grouped = {};
  filtered.forEach(item => {
    if (!grouped[item.cat]) grouped[item.cat] = [];
    grouped[item.cat].push(item);
  });

  for (let cat in grouped) {
    const section = document.createElement('div');
    section.className = 'section';

    const heading = document.createElement('h3');
    heading.textContent = cat + ' Resources';
    section.appendChild(heading);

    const cardsDiv = document.createElement('div');
    cardsDiv.className = 'cards';

    grouped[cat].forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-top">
          <div class="card-icon">${item.icon}</div>
          <div class="card-header">
            <div class="badge">${item.cat}</div>
            <h4>${item.title}</h4>
          </div>
        </div>
        <p class="card-desc">${item.desc}</p>
        <div class="card-tags">
          ${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
        </div>
        <div class="card-footer">
          <span class="card-meta">Recommended for you</span>
          <span class="card-arrow">→</span>
        </div>
      `;
      card.onclick = () => openModal(item);
      cardsDiv.appendChild(card);
    });

    section.appendChild(cardsDiv);
    content.appendChild(section);
  }
}

function openModal(item) {
  document.getElementById('modalTitle').textContent = item.title;
  document.getElementById('modalDesc').textContent = item.desc;
  document.getElementById('modalBtn').onclick = () => {
    window.open(item.url, '_blank');
    closeModal();
  };
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

renderChat();
</script>

</body>
</html>
